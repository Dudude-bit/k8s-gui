# CustomResourceDefinition for CRD views (cluster-scoped).
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: widgets.demo.k8s-gui.io
spec:
  group: demo.k8s-gui.io
  scope: Namespaced
  names:
    plural: widgets
    singular: widget
    kind: Widget
    shortNames:
      - wd
  versions:
    - name: v1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Tier
          type: string
          jsonPath: .spec.tier
        - name: Ready
          type: string
          jsonPath: .status.ready
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                tier:
                  type: string
                size:
                  type: integer
                description:
                  type: string
            status:
              type: object
              properties:
                ready:
                  type: string
      subresources:
        status: {}
