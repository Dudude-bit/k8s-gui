# =============================================================================
# Traefik CRDs (IngressRoute, Middleware, etc.)
# =============================================================================
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ingressroutes.traefik.io
spec:
  group: traefik.io
  scope: Namespaced
  names:
    plural: ingressroutes
    singular: ingressroute
    kind: IngressRoute
    shortNames:
      - ir
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: EntryPoints
          type: string
          jsonPath: .spec.entryPoints
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                entryPoints:
                  type: array
                  items:
                    type: string
                routes:
                  type: array
                  items:
                    type: object
                    properties:
                      match:
                        type: string
                      kind:
                        type: string
                      services:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            port:
                              type: integer
                            namespace:
                              type: string
                      middlewares:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            namespace:
                              type: string
                tls:
                  type: object
                  properties:
                    secretName:
                      type: string
                    certResolver:
                      type: string
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: middlewares.traefik.io
spec:
  group: traefik.io
  scope: Namespaced
  names:
    plural: middlewares
    singular: middleware
    kind: Middleware
    shortNames:
      - mw
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                stripPrefix:
                  type: object
                  properties:
                    prefixes:
                      type: array
                      items:
                        type: string
                addPrefix:
                  type: object
                  properties:
                    prefix:
                      type: string
                headers:
                  type: object
                  properties:
                    customRequestHeaders:
                      type: object
                      additionalProperties:
                        type: string
                    customResponseHeaders:
                      type: object
                      additionalProperties:
                        type: string
                rateLimit:
                  type: object
                  properties:
                    average:
                      type: integer
                    burst:
                      type: integer
                basicAuth:
                  type: object
                  properties:
                    secret:
                      type: string
                    removeHeader:
                      type: boolean
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: traefikservices.traefik.io
spec:
  group: traefik.io
  scope: Namespaced
  names:
    plural: traefikservices
    singular: traefikservice
    kind: TraefikService
    shortNames:
      - ts
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                weighted:
                  type: object
                  properties:
                    services:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          port:
                            type: integer
                          weight:
                            type: integer
                mirroring:
                  type: object
                  properties:
                    name:
                      type: string
                    port:
                      type: integer
                    mirrors:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          port:
                            type: integer
                          percent:
                            type: integer
