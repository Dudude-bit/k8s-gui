                        consecutive5xxErrors:
                          type: integer
                        interval:
                          type: string
                        baseEjectionTime:
                          type: string
                subsets:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      labels:
                        type: object
                        additionalProperties:
                          type: string
                      trafficPolicy:
                        type: object
                        properties:
                          loadBalancer:
                            type: object
                            properties:
                              simple:
                                type: string
