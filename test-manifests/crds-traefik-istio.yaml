# =============================================================================
# Istio CRDs (VirtualService, DestinationRule, Gateway)
# =============================================================================
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: virtualservices.networking.istio.io
spec:
  group: networking.istio.io
  scope: Namespaced
  names:
    plural: virtualservices
    singular: virtualservice
    kind: VirtualService
    shortNames:
      - vs
  versions:
    - name: v1beta1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Gateways
          type: string
          jsonPath: .spec.gateways
        - name: Hosts
          type: string
          jsonPath: .spec.hosts
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                hosts:
                  type: array
                  items:
                    type: string
                gateways:
                  type: array
                  items:
                    type: string
                http:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      match:
                        type: array
                        items:
                          type: object
                          properties:
                            uri:
                              type: object
                              properties:
                                prefix:
                                  type: string
                                exact:
                                  type: string
                            headers:
                              type: object
                              additionalProperties:
                                type: object
                                properties:
                                  exact:
                                    type: string
                      route:
                        type: array
                        items:
                          type: object
                          properties:
                            destination:
                              type: object
                              properties:
                                host:
                                  type: string
                                port:
                                  type: object
                                  properties:
                                    number:
                                      type: integer
                                subset:
                                  type: string
                            weight:
                              type: integer
                      timeout:
                        type: string
                      retries:
                        type: object
                        properties:
                          attempts:
                            type: integer
                          perTryTimeout:
                            type: string
                tcp:
                  type: array
                  items:
                    type: object
                    properties:
                      match:
                        type: array
                        items:
                          type: object
                          properties:
                            port:
                              type: integer
                      route:
                        type: array
                        items:
                          type: object
                          properties:
                            destination:
                              type: object
                              properties:
                                host:
                                  type: string
                                port:
                                  type: object
                                  properties:
                                    number:
                                      type: integer
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: destinationrules.networking.istio.io
spec:
  group: networking.istio.io
  scope: Namespaced
  names:
    plural: destinationrules
    singular: destinationrule
    kind: DestinationRule
    shortNames:
      - dr
  versions:
    - name: v1beta1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Host
          type: string
