# =============================================================================
# COMPREHENSIVE TEST MANIFEST FOR K8S-GUI
# =============================================================================
# Этот манифест создаёт все типы ресурсов для тестирования GUI
# Применить: kubectl apply -f comprehensive-test.yaml
# Удалить:   kubectl delete -f comprehensive-test.yaml
# =============================================================================

---
# =============================================================================
# NAMESPACE
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: k8s-gui-test
  labels:
    app: k8s-gui-test
    purpose: testing

---
# =============================================================================
# CONFIGMAPS
# =============================================================================

# ConfigMap с простыми данными
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: k8s-gui-test
  labels:
    app: k8s-gui-test
    component: config
data:
  APP_ENV: "development"
  APP_DEBUG: "true"
  LOG_LEVEL: "debug"
  DATABASE_HOST: "postgres.k8s-gui-test.svc.cluster.local"
  DATABASE_PORT: "5432"

---
# ConfigMap с многострочными данными
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: k8s-gui-test
  labels:
    app: k8s-gui-test
    component: nginx
data:
  nginx.conf: |
    worker_processes auto;
    events {
        worker_connections 1024;
    }
    http {
        server {
            listen 80;
            server_name localhost;

            location / {
                root /usr/share/nginx/html;
                index index.html;
            }

            location /api {
                proxy_pass http://backend:8080;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            location /health {
                return 200 'OK';
                add_header Content-Type text/plain;
            }
        }
    }
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>K8s GUI Test</title></head>
    <body>
      <h1>Welcome to K8s GUI Test</h1>
      <p>This is a test page for k8s-gui application.</p>
    </body>
    </html>

---
# =============================================================================
# SECRETS
# =============================================================================

# Opaque Secret
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: k8s-gui-test
  labels:
    app: k8s-gui-test
    component: secrets
type: Opaque
stringData:
  DATABASE_USER: "admin"
  DATABASE_PASSWORD: "super-secret-password-123"
  API_KEY: "sk-test-api-key-1234567890abcdef"
  APP_SECRET: "app-secret-very-long-string"

---
# Docker Registry Secret
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-creds
  namespace: k8s-gui-test
  labels:
    app: k8s-gui-test
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "https://index.docker.io/v1/": {
          "username": "testuser",
          "password": "testpassword",
          "email": "test@example.com",
          "auth": "dGVzdHVzZXI6dGVzdHBhc3N3b3Jk"
        }
      }
    }

---
