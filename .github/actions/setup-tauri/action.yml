name: 'Setup Tauri build environment'
description: 'Installs Node, Rust, system deps, and (optionally) tauri-cli for Tauri builds'

inputs:
  target:
    description: 'Rust target triple (e.g. x86_64-unknown-linux-gnu)'
    required: true
  is_linux:
    description: 'Set to "true" when the matrix job is a Linux build'
    required: false
    default: 'false'
  is_macos:
    description: 'Set to "true" when the matrix job is a macOS build'
    required: false
    default: 'false'
  is_windows:
    description: 'Set to "true" when the matrix job is a Windows build'
    required: false
    default: 'false'
  install_tauri_cli:
    description: 'Install the `tauri` CLI binary. Not needed when using tauri-action (which bundles it).'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: 20
        cache: npm

    - name: Install JS dependencies
      shell: bash
      run: npm ci

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable @ 2025
      with:
        targets: ${{ inputs.target }}

    - name: Rust cache
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      with:
        cache-on-failure: true

    - name: Install Tauri CLI binary
      if: inputs.install_tauri_cli == 'true'
      uses: taiki-e/install-action@787505cde8a44ea468a00478fe52baf23b15bccd  # v2.75.21
      with:
        tool: tauri-cli

    - name: Install system dependencies (Linux)
      if: inputs.is_linux == 'true'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential curl git pkg-config protobuf-compiler \
          libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
          libsoup-3.0-dev libappindicator3-dev libssl-dev ca-certificates

    - name: Install system dependencies (macOS)
      if: inputs.is_macos == 'true'
      shell: bash
      run: brew install protobuf

    - name: Install protoc (Windows)
      if: inputs.is_windows == 'true'
      shell: pwsh
      run: choco install protoc --no-progress
