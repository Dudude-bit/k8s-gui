name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v2.0.0). Must already exist.'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            is_linux: true
          # linux-arm64 disabled: Ubuntu noble arm64 deps are broken on GitHub runners.
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            is_macos: true
          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            is_macos: true
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            is_windows: true

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system dependencies (Linux)
        if: matrix.is_linux
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl git pkg-config protobuf-compiler \
            libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev libappindicator3-dev libssl-dev ca-certificates

      - name: Install system dependencies (macOS)
        if: matrix.is_macos
        run: brew install pkg-config protobuf

      - name: Install protoc (Windows)
        if: matrix.is_windows
        run: choco install protoc --no-progress

      - name: Build, sign, and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: |
            See [CHANGELOG.md](https://github.com/Dudude-bit/k8s-gui/blob/main/CHANGELOG.md) for details.

            Download the appropriate binary for your platform below.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}
