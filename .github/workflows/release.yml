name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v2.0.0). Must already exist.'
        required: true

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            is_linux: true
          # linux-arm64 disabled: libglib2.0-dev arm64 deps unresolvable on GitHub runners.
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            is_macos: true
          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            is_macos: true
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            is_windows: true

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Tauri build environment
        uses: ./.github/actions/setup-tauri
        with:
          target: ${{ matrix.target }}
          is_linux: ${{ matrix.is_linux || false }}
          is_macos: ${{ matrix.is_macos || false }}
          is_windows: ${{ matrix.is_windows || false }}
          # tauri-action bundles its own CLI, don't install again
          install_tauri_cli: 'false'

      - name: Build, sign, and release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5  # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseBodyPath: CHANGELOG.md
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}
