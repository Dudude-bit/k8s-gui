name: Build Artifacts

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x64
            sys_deps: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.0-dev libgtk-3-dev libsoup2.4-dev libssl-dev pkg-config build-essential
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos-arm64
            sys_deps: brew install pkg-config
          - os: macos-15
            target: x86_64-apple-darwin
            artifact_suffix: macos-x64
            sys_deps: brew install pkg-config
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true
      - name: Install system dependencies
        run: ${{ matrix.sys_deps }}
      - name: Install JS dependencies
        run: npm install
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli
      - name: Build (cargo)
        run: cargo build --release --target ${{ matrix.target }}
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k8s-gui-${{ matrix.artifact_suffix }}
          path: |
            target/${{ matrix.target }}/release/k8s-gui*
            target/${{ matrix.target }}/release/*.so
            target/${{ matrix.target }}/release/*.d
            target/${{ matrix.target }}/release/*.a
