name: Build Artifacts

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-24.04
            artifact_name: k8s-gui-linux-x64
            target: x86_64-unknown-linux-gnu
            is_linux: true
          # linux-arm64 disabled: libglib2.0-dev arm64 deps unresolvable on GitHub runners.
          - name: macos-arm64
            os: macos-latest
            artifact_name: k8s-gui-macos-arm64
            target: aarch64-apple-darwin
            is_macos: true
          - name: macos-x64
            os: macos-latest
            artifact_name: k8s-gui-macos-x64
            target: x86_64-apple-darwin
            is_macos: true
          - name: windows-x64
            os: windows-latest
            artifact_name: k8s-gui-windows-x64
            target: x86_64-pc-windows-msvc
            is_windows: true

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Tauri build environment
        uses: ./.github/actions/setup-tauri
        with:
          target: ${{ matrix.target }}
          is_linux: ${{ matrix.is_linux || false }}
          is_macos: ${{ matrix.is_macos || false }}
          is_windows: ${{ matrix.is_windows || false }}
          install_tauri_cli: 'true'

      - name: Build (cargo tauri)
        # Skip updater-artifact signing in PR validation — release.yml has the secrets.
        # Frontend is built automatically by `cargo tauri build` via beforeBuildCommand.
        run: cargo tauri build --target ${{ matrix.target }} --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          find src-tauri/target -type f -path "*/release/bundle/*" -print -exec cp -v {} artifacts/ \; 2>/dev/null || true
          find target -type f -path "*/release/bundle/*" -print -exec cp -v {} artifacts/ \; 2>/dev/null || true
          echo "Artifacts collected:" && ls -la artifacts || true

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/*
          if-no-files-found: error
