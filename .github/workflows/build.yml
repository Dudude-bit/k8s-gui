name: Build Artifacts

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-24.04
            artifact_name: k8s-gui-linux-x64
            target: x86_64-unknown-linux-gnu
            is_linux: true

          # linux-arm64 temporarily disabled: Ubuntu noble upstream arm64
          # libglib2.0-dev package has unresolvable deps on GitHub runners.
          # Re-enable after upstream fix or switching to self-hosted arm64 runner.

          - name: macos-arm64
            os: macos-latest
            artifact_name: k8s-gui-macos-arm64
            target: aarch64-apple-darwin
            is_macos: true

          - name: macos-x64
            os: macos-latest
            artifact_name: k8s-gui-macos-x64
            target: x86_64-apple-darwin
            is_macos: true

          - name: windows-x64
            os: windows-latest
            artifact_name: k8s-gui-windows-x64
            target: x86_64-pc-windows-msvc
            is_windows: true

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1

    steps:
      - uses: actions/checkout@v4

      # ---------------- Setup dependencies ----------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      # ---------------- System-specific build ----------------
      - name: Install system dependencies (Linux)
        if: matrix.is_linux
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl git pkg-config protobuf-compiler \
            libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev libappindicator3-dev libssl-dev ca-certificates

      - name: Install system dependencies (macOS)
        if: matrix.is_macos
        run: brew install pkg-config protobuf

      - name: Install protoc (Windows)
        if: matrix.is_windows
        run: choco install protoc --no-progress

      - name: Build (cargo tauri)
        # Skip updater-artifact signing in PR builds — no signing secrets here.
        # Real release uses release.yml with TAURI_SIGNING_PRIVATE_KEY set.
        run: cargo tauri build --target ${{ matrix.target }} --config '{"bundle":{"createUpdaterArtifacts":false}}'

      # ---------------- Collect artifacts ----------------
      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts

          # Bundle output locations (Tauri)
          find src-tauri/target -type f -path "*/release/bundle/*" -print -exec cp -v {} artifacts/ \; 2>/dev/null || true
          find target -type f -path "*/release/bundle/*" -print -exec cp -v {} artifacts/ \; 2>/dev/null || true

          echo "Artifacts collected:"
          ls -la artifacts || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/*
          if-no-files-found: error
