name: Build Artifacts

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: k8s-gui-linux-x64
            artifact_suffix: linux-x64
            target: x86_64-unknown-linux-gnu
            sys_deps: |
              sudo apt-get update && sudo apt-get install -y \
                build-essential curl git pkg-config libgtk-3-dev \
                libwebkit2gtk-4.1-dev libsoup-gnome2.4-dev libappindicator3-dev \
                libssl-dev ca-certificates

          - os: ubuntu-latest
            artifact_name: k8s-gui-linux-arm64
            artifact_suffix: linux-arm64
            target: aarch64-unknown-linux-gnu
            sys_deps: |
              sudo apt-get update && sudo apt-get install -y \
                build-essential curl git pkg-config libgtk-3-dev \
                libwebkit2gtk-4.1-dev libsoup-gnome2.4-dev libappindicator3-dev \
                libssl-dev ca-certificates

          - os: macos-latest
            artifact_name: k8s-gui-macos-arm64
            artifact_suffix: macos-arm64
            target: aarch64-apple-darwin
            sys_deps: brew install pkg-config

          - os: macos-15
            artifact_name: k8s-gui-macos-x64
            artifact_suffix: macos-x64
            target: x86_64-apple-darwin
            sys_deps: brew install pkg-config

          - os: windows-latest
            artifact_name: k8s-gui-windows-x64
            artifact_suffix: windows-x64
            target: x86_64-pc-windows-msvc
            sys_deps: choco install -y rust-msvc

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1

    steps:
      - uses: actions/checkout@v4

      # ---------------- Setup dependencies ----------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      # ---------------- System-specific build ----------------
      - name: Install system dependencies
        run: ${{ matrix.sys_deps }}

      - name: Build (cargo)
        run: cargo build --release --target ${{ matrix.target }}

      # ---------------- Collect artifacts ----------------
      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts

          # Find all release artifacts for the specific target
          find target/${{ matrix.target }}/release -maxdepth 1 \
            \( -name "k8s-gui*" -o -name "*.so" -o -name "*.dll" -o -name "*.dylib" -o -name "*.a" -o -name "*.d" \) \
            -exec cp -v {} artifacts/ \; 2>/dev/null || true

          echo "Artifacts collected:"
          ls -la artifacts || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/*
          if-no-files-found: error
