name: Build Artifacts

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: k8s-gui-linux-x64
            artifact_suffix: linux-x64
            use_docker: "true"
            target: x86_64-unknown-linux-gnu

          - os: macos-latest
            artifact_name: k8s-gui-macos-arm64
            artifact_suffix: macos-arm64
            use_docker: "false"
            target: aarch64-apple-darwin
            sys_deps: brew install pkg-config

          - os: macos-15
            artifact_name: k8s-gui-macos-x64
            artifact_suffix: macos-x64
            use_docker: "false"
            target: x86_64-apple-darwin
            sys_deps: brew install pkg-config

    env:
      CARGO_TERM_COLOR: always

    steps:
      - uses: actions/checkout@v4

      # ---------------- macOS path (native build) ----------------
      - name: Set up Node.js
        if: matrix.use_docker != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install JS dependencies
        if: matrix.use_docker != 'true'
        run: npm ci

      - name: Build frontend
        if: matrix.use_docker != 'true'
        run: npm run build

      - name: Set up Rust
        if: matrix.use_docker != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        if: matrix.use_docker != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        if: matrix.use_docker != 'true'
        run: ${{ matrix.sys_deps }}

      - name: Build (cargo)
        if: matrix.use_docker != 'true'
        run: cargo build --release --locked --target ${{ matrix.target }}

      # ---------------- Linux path (Docker build) ----------------
      - name: Set up Docker Buildx
        if: matrix.use_docker == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build in Docker (Fedora, linux-x64)
        if: matrix.use_docker == 'true'
        run: |
          docker build --platform=linux/amd64 -t k8s-gui-build .
          docker run --platform=linux/amd64 --rm \
            -v "${{ github.workspace }}:/app" -w /app \
            k8s-gui-build bash -lc 'source "$HOME/.cargo/env" && cargo build --release --locked --target x86_64-unknown-linux-gnu'

      # ---------------- Collect & upload artifacts (unified) ----------------
      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts

          if [[ "${{ matrix.use_docker }}" == "true" ]]; then
            # linux: default target dir
            cp -v target/release/k8s-gui* artifacts/ 2>/dev/null || true
            cp -v target/release/*.so     artifacts/ 2>/dev/null || true
            cp -v target/release/*.d      artifacts/ 2>/dev/null || true
            cp -v target/release/*.a      artifacts/ 2>/dev/null || true
          else
            # mac: target/<triple>/release
            cp -v target/${{ matrix.target }}/release/k8s-gui* artifacts/ 2>/dev/null || true
            cp -v target/${{ matrix.target }}/release/*.so     artifacts/ 2>/dev/null || true
            cp -v target/${{ matrix.target }}/release/*.d      artifacts/ 2>/dev/null || true
            cp -v target/${{ matrix.target }}/release/*.a      artifacts/ 2>/dev/null || true
          fi

          echo "Artifacts:"
          ls -la artifacts || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/*
          if-no-files-found: warn
