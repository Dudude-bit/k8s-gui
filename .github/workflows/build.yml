name: Build Artifacts

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-24.04
            artifact_name: k8s-gui-linux-x64
            target: x86_64-unknown-linux-gnu

          - name: linux-arm64
            os: ubuntu-24.04
            artifact_name: k8s-gui-linux-arm64
            target: aarch64-unknown-linux-gnu

          - name: macos-arm64
            os: macos-14
            artifact_name: k8s-gui-macos-arm64
            target: aarch64-apple-darwin

          - name: macos-x64
            os: macos-14
            artifact_name: k8s-gui-macos-x64
            target: x86_64-apple-darwin

          - name: windows-x64
            os: windows-latest
            artifact_name: k8s-gui-windows-x64
            target: x86_64-pc-windows-msvc

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1

    steps:
      - uses: actions/checkout@v4

      # ---------------- Setup dependencies ----------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      # ---------------- System-specific build ----------------
      - name: Install system dependencies (Linux)
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl git pkg-config protobuf-compiler \
            libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev libappindicator3-dev libssl-dev ca-certificates

      - name: Install system dependencies (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i 's/^Types: deb/Types: deb\nArchitectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
          fi
          cat <<'EOF' | sudo tee /etc/apt/sources.list.d/ubuntu-arm64.sources
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: noble noble-updates noble-backports noble-security
          Components: main universe restricted multiverse
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libgtk-3-dev:arm64 libwebkit2gtk-4.1-dev:arm64 \
            libjavascriptcoregtk-4.1-dev:arm64 libsoup-3.0-dev:arm64 \
            libappindicator3-dev:arm64 libssl-dev:arm64

      - name: Install system dependencies (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: brew install pkg-config protobuf

      - name: Install protoc (Windows)
        if: startsWith(matrix.os, 'windows-')
        run: choco install protoc --no-progress

      - name: Configure cross-compilation for ARM64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV

      - name: Build (cargo tauri)
        run: cargo tauri build --target ${{ matrix.target }}

      # ---------------- Collect artifacts ----------------
      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts

          # Bundle output locations (Tauri)
          find src-tauri/target -type f -path "*/release/bundle/*" -print -exec cp -v {} artifacts/ \; 2>/dev/null || true
          find target -type f -path "*/release/bundle/*" -print -exec cp -v {} artifacts/ \; 2>/dev/null || true

          echo "Artifacts collected:"
          ls -la artifacts || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/*
          if-no-files-found: error
